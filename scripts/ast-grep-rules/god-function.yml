# Detect overly large functions (SvelteKit load functions and server endpoints tend to bloat)
# This uses a heuristic: functions with many statements are likely doing too much.
# ast-grep doesn't have a built-in line counter, so we check for deeply nested blocks
# as a proxy for complexity.
id: god-function-arrow
language: TypeScript
severity: warning
message: >-
  Large function detected. Consider extracting logic into smaller helper
  functions for readability and testability. SvelteKit load functions and
  server endpoints are especially prone to bloat.
rule:
  kind: arrow_function
  has:
    kind: statement_block
    has:
      kind: statement_block
      has:
        kind: statement_block
        has:
          kind: statement_block
---
id: god-function-declaration
language: TypeScript
severity: warning
message: >-
  Large function detected. Consider extracting logic into smaller helper
  functions for readability and testability.
rule:
  kind: function_declaration
  has:
    kind: statement_block
    has:
      kind: statement_block
      has:
        kind: statement_block
        has:
          kind: statement_block
