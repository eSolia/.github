# Detect N+1 query patterns: database calls inside array iteration
# Common in D1 codebases where .prepare().bind().first() is called per item.
id: n-plus-one-query-map
language: TypeScript
severity: warning
message: >-
  Potential N+1 query: database call inside .map(). Consider using a single
  query with WHERE IN or db.batch() to avoid per-item database round trips.
rule:
  pattern: $ARR.map($$$ARGS)
  has:
    pattern: $DB.prepare($$$SQL)
    stopBy: end
