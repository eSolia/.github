# Detect SQL injection via template literals in D1 prepare() calls
# D1 uses raw SQL — template literal interpolation is a real injection risk.
# Use parameterized queries with .bind() instead.
id: sql-injection-d1
language: TypeScript
severity: error
message: >-
  SQL injection risk: template literal in db.prepare(). Use parameterized
  queries with .bind() instead of interpolating values into SQL strings.
note: >-
  Instead of: db.prepare(`SELECT * FROM t WHERE id = ${id}`)
  Use: db.prepare("SELECT * FROM t WHERE id = ?").bind(id)
rule:
  pattern: $DB.prepare(`$$$SQL`)
