# Detect D1 queries that fetch all rows without a LIMIT clause
# Unbounded .all() calls can return unexpectedly large result sets.
id: unbounded-query-all
language: TypeScript
severity: warning
message: >-
  Unbounded query: .all() without LIMIT in the SQL. Consider adding a LIMIT
  clause to prevent unexpectedly large result sets, especially in Workers
  where memory is constrained.
note: >-
  D1 queries inside Workers have memory limits. Always add LIMIT to SELECT
  queries that could return many rows, or paginate with LIMIT/OFFSET.
rule:
  all:
    - pattern: $DB.prepare($SQL).$$$CHAIN.all()
    - not:
        has:
          kind: string
          regex: "(?i)limit"
          stopBy: end
