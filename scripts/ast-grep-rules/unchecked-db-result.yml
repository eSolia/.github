# Detect fire-and-forget D1 mutations (insert/update/delete without checking result)
# D1 .run() returns metadata including success status — ignoring it hides failures.
id: unchecked-db-run
language: TypeScript
severity: warning
message: >-
  Unchecked database mutation: .run() result is not awaited or assigned.
  D1 .run() returns {success, meta} — check the result to detect failures.
note: >-
  Instead of: db.prepare("DELETE FROM t WHERE id = ?").bind(id).run()
  Use: const result = await db.prepare("DELETE FROM t WHERE id = ?").bind(id).run()
rule:
  kind: expression_statement
  has:
    pattern: $$$CHAIN.run()
    has:
      pattern: $DB.prepare($$$SQL)
      stopBy: end
