# ============================================================================
# Reusable: Check @esolia/core version
# ============================================================================
#
# Opens a GitHub Issue when a newer @esolia/core version is available.
#
# Usage in any consumer repo:
#
#   # .github/workflows/check-core-update.yml
#   name: Check @esolia/core updates
#   on:
#     schedule:
#       - cron: '0 9 * * 1'   # Every Monday 09:00 UTC
#     workflow_dispatch:
#   jobs:
#     check:
#       uses: eSolia/.github/.github/workflows/check-core-update.yml@v1.0.0
#       secrets:
#         gh-packages-token: ${{ secrets.GH_PACKAGES_TOKEN }}
#
# ============================================================================

name: Check @esolia/core Update

on:
  workflow_call:
    inputs:
      package-name:
        description: 'Package to check (default: @esolia/core)'
        required: false
        type: string
        default: '@esolia/core'

      package-manager:
        description: 'Package manager: npm, pnpm, yarn, or bun'
        required: false
        type: string
        default: 'npm'

      issue-labels:
        description: 'Comma-separated labels to apply to the issue'
        required: false
        type: string
        default: 'dependencies,core-update'

    secrets:
      gh-packages-token:
        description: 'Token with read:packages scope for GitHub Packages'
        required: true

jobs:
  check:
    name: Check for update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Get local version
        id: local
        env:
          PKG_NAME: ${{ inputs.package-name }}
        run: |
          # Check package.json for the installed version spec
          LOCAL=$(node -e "
            const pkg = require('./package.json');
            const name = process.env.PKG_NAME;
            const v = (pkg.dependencies && pkg.dependencies[name])
                   || (pkg.devDependencies && pkg.devDependencies[name])
                   || '';
            // Strip range characters (^, ~, >=, etc.) to get the version number
            console.log(v.replace(/^[\^~>=<]+/, ''));
          ")

          if [ -z "$LOCAL" ]; then
            echo "::notice::$PKG_NAME not found in package.json — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "version=$LOCAL" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Local version: $LOCAL"

      - name: Get latest published version
        if: steps.local.outputs.skip != 'true'
        id: latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.gh-packages-token }}
          PKG_NAME: ${{ inputs.package-name }}
        run: |
          LATEST=$(npm view "$PKG_NAME" version 2>/dev/null || echo "")

          if [ -z "$LATEST" ]; then
            echo "::error::Could not fetch latest version of $PKG_NAME from registry"
            exit 1
          fi

          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest published: $LATEST"

      - name: Compare versions
        if: steps.local.outputs.skip != 'true'
        id: compare
        env:
          LOCAL: ${{ steps.local.outputs.version }}
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          if [ "$LOCAL" = "$LATEST" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "Already up to date ($LOCAL)"
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
            echo "Update available: $LOCAL → $LATEST"
          fi

      - name: Check for existing issue
        if: steps.compare.outputs.up_to_date == 'false'
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          PKG_NAME: ${{ inputs.package-name }}
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          # Search for open issues with matching title
          COUNT=$(gh issue list \
            --state open \
            --search "Update $PKG_NAME to $LATEST in:title" \
            --json number \
            --jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Issue already exists — skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Open update issue
        if: steps.compare.outputs.up_to_date == 'false' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PKG_NAME: ${{ inputs.package-name }}
          LOCAL: ${{ steps.local.outputs.version }}
          LATEST: ${{ steps.latest.outputs.version }}
          LABELS: ${{ inputs.issue-labels }}
        run: |
          # Get the changelog/release notes URL
          RELEASE_URL="https://github.com/eSolia/core/releases/tag/v${LATEST}"

          gh issue create \
            --title "Update $PKG_NAME to $LATEST" \
            --label "$LABELS" \
            --body "$(cat <<EOF
          ## $PKG_NAME update available

          | | Version |
          |---|---------|
          | **Current** | \`$LOCAL\` |
          | **Latest** | \`$LATEST\` |

          ### Update command

          \`\`\`bash
          npm install ${PKG_NAME}@${LATEST}
          \`\`\`

          ### Checklist

          - [ ] Update \`$PKG_NAME\` in package.json
          - [ ] Run \`npm install\` / \`pnpm install\`
          - [ ] Verify types still compile (\`npm run typecheck\`)
          - [ ] Run tests
          - [ ] Check for breaking changes in [release notes]($RELEASE_URL)

          ---
          *Opened automatically by [check-core-update](https://github.com/eSolia/.github) workflow.*
          EOF
          )"

          echo "::notice::Issue created for $PKG_NAME $LOCAL → $LATEST"
