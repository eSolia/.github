# ============================================================================
# Wrangler QC Checks — Reusable Workflow
# ============================================================================
# Validates wrangler configuration across all workers in a repo.
# Checks: account_id, compatibility_date staleness, JSONC format, observability.
#
# Usage in calling repo:
#   jobs:
#     qc:
#       uses: eSolia/.github/.github/workflows/qc-wrangler.yml@main
#
# Or with options:
#   jobs:
#     qc:
#       uses: eSolia/.github/.github/workflows/qc-wrangler.yml@main
#       with:
#         fail-on-warnings: true
#         max-compat-age-days: 30
# ============================================================================

name: Wrangler QC

on:
  workflow_call:
    inputs:
      fail-on-warnings:
        description: 'Fail the workflow if any QC warnings are found'
        required: false
        type: boolean
        default: false
      max-compat-age-days:
        description: 'Max age in days for compatibility_date before flagging as stale (0 = must be today)'
        required: false
        type: number
        default: 30
      skip-paths:
        description: 'Pipe-separated paths to skip (e.g., "docs/|tmp/|_archive/")'
        required: false
        type: string
        default: 'docs/|tmp/|_archive/'

jobs:
  qc-wrangler:
    name: Wrangler Config QC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run QC checks
        id: qc
        env:
          MAX_AGE_DAYS: ${{ inputs.max-compat-age-days }}
          SKIP_PATHS: ${{ inputs.skip-paths }}
          FAIL_ON_WARNINGS: ${{ inputs.fail-on-warnings }}
        run: |
          WARNINGS=0
          ERRORS=0
          TODAY=$(date +%Y-%m-%d)
          TODAY_EPOCH=$(date -d "$TODAY" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$TODAY" +%s)

          echo "## Wrangler QC Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run date: $TODAY" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          should_skip() {
            local path="$1"
            if [ -n "$SKIP_PATHS" ]; then
              echo "$path" | grep -qE "$SKIP_PATHS" && return 0
            fi
            return 1
          }

          # ── Check 1: Non-JSONC wrangler configs ──
          echo "### Config Format" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          NON_JSONC=$(find . -maxdepth 4 \( -name 'wrangler.toml' -o -name 'wrangler.json' -o -name 'wrangler.yaml' \) \
            -not -path '*/node_modules/*' -not -path '*/.wrangler/*' | sort)

          if [ -n "$NON_JSONC" ]; then
            echo "| File | Issue |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r f; do
              rel="${f#./}"
              if should_skip "$rel"; then
                echo "| \`$rel\` | Skipped (excluded path) |" >> $GITHUB_STEP_SUMMARY
                continue
              fi
              echo "| \`$rel\` | Should be \`wrangler.jsonc\` |" >> $GITHUB_STEP_SUMMARY
              echo "::warning file=$rel::Non-JSONC wrangler config detected. Cloudflare recommends wrangler.jsonc"
              WARNINGS=$((WARNINGS + 1))
            done <<< "$NON_JSONC"
          else
            echo "All wrangler configs use JSONC format." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Find all wrangler.jsonc files ──
          JSONC_FILES=$(find . -maxdepth 4 -name 'wrangler.jsonc' \
            -not -path '*/node_modules/*' -not -path '*/.wrangler/*' -not -path '*/.svelte-kit/*' | sort)

          if [ -z "$JSONC_FILES" ]; then
            echo "No wrangler.jsonc files found." >> $GITHUB_STEP_SUMMARY
            echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ── Check 2: account_id ──
          echo "### account_id" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r f; do
            rel="${f#./}"
            if should_skip "$rel"; then
              echo "| \`$rel\` | Skipped |" >> $GITHUB_STEP_SUMMARY
              continue
            fi
            if grep -qE '"account_id"\s*:\s*"[^"]+"' "$f" 2>/dev/null; then
              echo "| \`$rel\` | OK |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$rel\` | **MISSING** |" >> $GITHUB_STEP_SUMMARY
              echo "::warning file=$rel::Missing or empty account_id in wrangler config"
              WARNINGS=$((WARNINGS + 1))
            fi
          done <<< "$JSONC_FILES"
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Check 3: compatibility_date ──
          echo "### compatibility_date" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Date | Age | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r f; do
            rel="${f#./}"
            if should_skip "$rel"; then
              echo "| \`$rel\` | - | - | Skipped |" >> $GITHUB_STEP_SUMMARY
              continue
            fi
            COMPAT_DATE=$(grep -o '"compatibility_date": "[^"]*"' "$f" 2>/dev/null | head -1 | sed 's/.*: "//;s/"//')
            if [ -z "$COMPAT_DATE" ]; then
              echo "| \`$rel\` | None | - | **MISSING** |" >> $GITHUB_STEP_SUMMARY
              echo "::warning file=$rel::No compatibility_date found"
              WARNINGS=$((WARNINGS + 1))
            else
              # Calculate age in days
              COMPAT_EPOCH=$(date -d "$COMPAT_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$COMPAT_DATE" +%s 2>/dev/null || echo "0")
              if [ "$COMPAT_EPOCH" = "0" ]; then
                AGE_DAYS="unknown"
                STATUS="Could not parse date"
              else
                AGE_DAYS=$(( (TODAY_EPOCH - COMPAT_EPOCH) / 86400 ))
                if [ "$AGE_DAYS" -gt "$MAX_AGE_DAYS" ]; then
                  STATUS="**STALE** (${AGE_DAYS}d > ${MAX_AGE_DAYS}d)"
                  echo "::warning file=$rel::compatibility_date is $AGE_DAYS days old ($COMPAT_DATE)"
                  WARNINGS=$((WARNINGS + 1))
                else
                  STATUS="OK"
                fi
              fi
              echo "| \`$rel\` | $COMPAT_DATE | ${AGE_DAYS}d | $STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          done <<< "$JSONC_FILES"
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Check 4: observability ──
          echo "### Observability" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r f; do
            rel="${f#./}"
            if should_skip "$rel"; then
              echo "| \`$rel\` | Skipped |" >> $GITHUB_STEP_SUMMARY
              continue
            fi
            if ! grep -q '"observability"' "$f" 2>/dev/null; then
              echo "| \`$rel\` | **MISSING** |" >> $GITHUB_STEP_SUMMARY
              echo "::warning file=$rel::No observability configuration found"
              WARNINGS=$((WARNINGS + 1))
            elif grep -q '"enabled"\s*:\s*false' "$f" 2>/dev/null; then
              echo "| \`$rel\` | **DISABLED** |" >> $GITHUB_STEP_SUMMARY
              echo "::warning file=$rel::Observability is disabled"
              WARNINGS=$((WARNINGS + 1))
            else
              echo "| \`$rel\` | OK |" >> $GITHUB_STEP_SUMMARY
            fi
          done <<< "$JSONC_FILES"
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Summary ──
          echo "---" >> $GITHUB_STEP_SUMMARY
          if [ $WARNINGS -eq 0 ]; then
            echo "**All QC checks passed.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**$WARNINGS warning(s) found.** Review issues above." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Workflow: [eSolia/.github](https://github.com/eSolia/.github)*" >> $GITHUB_STEP_SUMMARY

          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

      - name: Fail on warnings
        if: inputs.fail-on-warnings && steps.qc.outputs.warnings != '0'
        run: |
          echo "::error::${{ steps.qc.outputs.warnings }} QC warning(s) found. Set fail-on-warnings: false to allow."
          exit 1
